name: SAİS Sorumlusu APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu indir
      uses: actions/checkout@v4

    - name: Java 17 kur
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: İmzalama Anahtarı Oluştur
      run: |
        keytool -genkeypair \
          -alias simgiris \
          -keypass simgiris2024 \
          -keystore simgiris.keystore \
          -storepass simgiris2024 \
          -dname "CN=IZSU Yarimada, OU=Tesisler, O=IZSU, L=Izmir, ST=Izmir, C=TR" \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000

    - name: Gradle kur ve Wrapper oluştur
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.7/bin/gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    - name: Gradle önbelleği
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}

    - name: Release APK Derle
      run: ./gradlew assembleRelease --stacktrace

    - name: APK İmzala
      run: |
        BUILD_TOOLS=$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/zipalign -v 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          aligned.apk
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner sign \
          --ks simgiris.keystore \
          --ks-pass pass:simgiris2024 \
          --key-pass pass:simgiris2024 \
          --ks-key-alias simgiris \
          --out SAISorumlusu.apk \
          aligned.apk

    - name: İmzalı APK'yı yükle
      uses: actions/upload-artifact@v4
      with:
        name: SAISorumlusu-Imzali
        path: SAISorumlusu.apk
        retention-days: 30
