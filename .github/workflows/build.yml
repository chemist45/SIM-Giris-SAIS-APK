name: APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodu indir
      uses: actions/checkout@v4

    - name: Java 17 kur
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle kur ve Wrapper oluştur
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.7/bin/gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    - name: Gradle önbelleği
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}

    - name: APK derle
      run: ./gradlew assembleDebug --stacktrace

    - name: APK dosyasını yükle
      uses: actions/upload-artifact@v4
      with:
        name: SIM-Giris-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
