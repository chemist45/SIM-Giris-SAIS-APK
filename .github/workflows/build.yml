name: SAİS Sorumlusu APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Kodu indir
      uses: actions/checkout@v4

    - name: Java 17 kur
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Gradle kur ve Wrapper oluştur
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O gradle.zip
        unzip -q gradle.zip
        ./gradle-8.7/bin/gradle wrapper --gradle-version 8.7
        chmod +x gradlew

    - name: Gradle önbelleği
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('**/*.gradle*') }}

    - name: versionCode hesapla
      id: ver
      run: echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Release APK Derle
      run: ./gradlew assembleRelease --stacktrace

    - name: APK İmzala (sabit keystore)
      run: |
        BUILD_TOOLS=$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/zipalign -v 4 \
          app/build/outputs/apk/release/app-release-unsigned.apk \
          aligned.apk
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner sign \
          --ks simgiris-release.p12 \
          --ks-type PKCS12 \
          --ks-pass pass:simgiris2024 \
          --key-pass pass:simgiris2024 \
          --ks-key-alias simgiris \
          --out SAISorumlusu.apk \
          aligned.apk
        echo "İmza doğrulama:"
        ${ANDROID_HOME}/build-tools/${BUILD_TOOLS}/apksigner verify --verbose SAISorumlusu.apk

    - name: Artifact yükle
      uses: actions/upload-artifact@v4
      with:
        name: SAISorumlusu-v${{ steps.ver.outputs.code }}
        path: SAISorumlusu.apk
        retention-days: 30

    - name: GitHub Release oluştur
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ steps.ver.outputs.code }}
        name: "SAİS Sorumlusu v${{ steps.ver.outputs.code }}"
        body: |
          SAİS Sorumlusu APK — otomatik derleme #${{ steps.ver.outputs.code }}

          **Kurulum:** APK dosyasını indir → aç → Yükle.
          POCO/Xiaomi: Ayarlar → Güvenlik → Bilinmeyen Kaynaklardan Yükle → İzin ver
        artifacts: SAISorumlusu.apk
        artifactContentType: application/vnd.android.package-archive
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
